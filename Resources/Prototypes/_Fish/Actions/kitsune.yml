- type: entity
  parent: BaseAction
  id: ActionKitsuneTransform
  name: kitsune-transform-action-name
  description: "kitsune-transform-action-description"
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon:
      sprite: Mobs/Animals/fox.rsi
      state: fox
    useDelay: 5
    temporary: true
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:KitsuneTransformActionEvent

- type: entity
  parent: BaseAction
  id: ActionKitsuneRevert
  name: kitsune-revert-action-name
  description: "kitsune-revert-action-description"
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon:
      sprite: _Fish/nine_tailed_fox.rsi
      state: fox
    useDelay: 5
    temporary: true
    itemIconStyle: NoItem
  - type: InstantAction
    event: !type:KitsuneRevertActionEvent

- type: entity
  parent: BaseAction
  id: ActionKitsuneFire
  name: kitsune-fire-action-name
  description: kitsune-fire-action-description
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: { sprite: _Fish/kitsune_fire.rsi, state: fire }
    useDelay: 15
    itemIconStyle: NoItem
    checkCanInteract: false
  - type: TargetAction
    range: 15
    checkCanAccess: false
  - type: EntityTargetAction
    canTargetSelf: true
    event: !type:KitsuneFireActionEvent

- type: entity
  parent: BaseAction
  id: ActionKitsuneFoxLights
  name: kitsune-lights-action-name
  description: kitsune-lights-action-description
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: { sprite: _Fish/kitsune_fire.rsi, state: fire }
    useDelay: 10
    itemIconStyle: NoItem
    checkCanInteract: true
  - type: InstantAction
    event: !type:KitsuneFoxLightsActionEvent
