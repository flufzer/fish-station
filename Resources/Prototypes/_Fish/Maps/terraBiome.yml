- type: gameMap
  id: terra Biome
  mapName: 'Terra Colony'
  mapPath: /Maps/_Fish/Station/terraBiome.yml 
  maxRandomOffset: 0
  randomRotation: false
  minPlayers: 0
  maxPlayers: 30
  stations:
    FishTerra:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Терра {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'MT'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_Fish/Shuttles/emergency_Case.yml
        - type: SpawnGridAndDockToStation
          grids:
          - gridPath: /Maps/_Fish/Shuttles/mining.yml
            priorityTag: DockMining
          - gridPath: /Maps/_Fish/empty.yml
            priorityTag: DockFishSecurity
        - type: StationBiome
          biome: TerraPlanet
          mapLightColor: "#090303FF"
        - type: StationJobs
          availableJobs:
            # service
            Passenger: [ -1, -1 ]
            ServiceWorker: [ 1, 1 ]
            Bartender: [ 1, 1 ]
            Botanist: [ 2, 2 ]
            Chef: [ 1, 1 ]
            Clown: [ 1, 1 ]
            Janitor: [ 1, 2 ]
            Mime: [ 1, 1 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            Musician: [ 1, 1 ]
            Reporter: [ 1, 1 ]
            # command
            Captain: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            ComMaid: [ 1, 1 ] # Горничная командования
            Adjutant: [ 1, 1 ]
            NanoTrasenRepresentative: [ 1, 1 ]
            #law
            IAA: [ 1, 1 ]
            Lawyer: [ 1, 1 ]
            #blueshield
            BlueShieldEnsign: [ 1, 1 ]
            RepresentativeBlueShield: [ 1, 1 ]
            # engineering
            ChiefEngineer: [ 1, 1 ]
            SeniorEngineer: [ 1, 1 ]
            AtmosphericTechnician: [ 1, 1 ]
            StationEngineer: [ 2, 2 ]
            TechnicalAssistant: [ 1, 1 ]
            # medical
            ChiefMedicalOfficer: [ 1, 1 ]
            SeniorPhysician: [ 1, 1 ]
            Paramedic: [ 1, 1 ]
            Chemist: [ 1, 1 ]
            MedicalDoctor: [ 1, 1 ]
            MedicalIntern: [ 1, 1 ]
            Psychologist: [ 1, 1 ]
            # science
            ResearchDirector: [ 1, 1 ]
            SeniorResearcher: [ 1, 1 ]
            Scientist: [ 2, 2 ]
            ResearchAssistant: [ 1, 1 ]
            # security
            HeadOfSecurity: [ 1, 1 ]
            SeniorOfficer: [ 1, 1 ]
            Warden: [ 1, 1 ]
            Detective: [ 1, 1 ]
            SecurityOfficer: [ 2, 2 ]
            SecurityCadet: [ 1, 1 ]
            # cargo
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 2, 3 ]
            MiningSpecialist: [ 1, 1 ]
            CargoTechnician: [ 2, 2 ]
            # silicon
            StationAi: [ 0, 1 ]
            Borg: [ 1, 1 ]
            MedicalBorg: [ 1, 1 ]
            EngineerBorg: [ 1, 1 ]
            MiningBorg: [ 1, 1 ]
            JanitorBorg: [ 1, 1 ]
            ServiceBorg: [ 1, 1 ]
            ClownBorg: [ 1, 1 ]
            PeaceBorg: [ 1, 1 ]
            SecurityBorg: [ 1, 1 ]
