        Бикаридин(90u) = Кислород(15u) + Сахар(15u) + Углерод(60u)


        Пункутроз(90u) = Гидроксид(45u) + Бикаридин(45u) + Нагреть(375K)
            Гидроксид(90u) = Кислород(45u) + Водород(45u) + Нагреть(375K)

        Дермалин(90u) = Углерод(15u) + Кремний(15u) + Кислород(30u) + Фосфор(30u)


        Трикордразин(90u) = |Калий(30u) + Кремний(30u) + Азот(30u)| + |Кислород(30u) + Сахар(30u) + Углерод(30u)|


        Инправалин(90u) = Кислород(30u) + Сахар(30u) + Углерод(30u)


        Аритрозин(60u) = Водород(30u) + Радий(15u) + Калий(5u) + Кремний(5u) + Азот(5u)


        Дексалин+(80u + 1u) = Плазма(1u) + Кислород(20 40u) + Углерод(30 20u) + Железо(30 20u) 


        Окулин(8u) = Кровь(2u) + Натрий(1u) + Хлор(1u) + Кислород(2u) + Водород(2u) + Нагреть(375K)


        Физраствор(100u) = Натрий(10u) + Хлор(10u) + Нагреть(375k) + Вода(80u)


        Амбузол(80u)+Диловен(10u) = КровьЗомби(40u) + Водород(15u) + Азот(15u) + Калий(10u) + Кремний(10u)


        Фризонка(90u) = Сахар(30u) + Литий(20u) + Ртуть(20u) + Калий(10u) + Кислород(10u)


        Диловен(90u) = Калий(30u) + Кремний(30u) + Азот(30u)


        Лепоразин(40u) = Плазма(1u) + Медь(20u) + Кремний(10u) + Железо(10u) + Нагреть(375K)


        Эфедрин с шлаком(180u+10u) = Сварка(15u) + Углерод(15u) + Азот(10u) + Водород(80u) + Сахар(45u) + Этанол(25u)


        Эфедрин(192u) = Сварка(16) + Углерод(16) + Азот(6) + Водород(82)  + Сахар(48) + Этанол(24)


        Дезоэфедрин(80u) = Фосфор(20u) + Йод(20u) + Углерод(20u) + Эфедрин(20u) + Нагреть(375k)


        Дифенгидрамин(60u) = Водород(4u) + Углерод(4u) + Сварка(4u) + Этанол(12u) + Углерод(12u) + Этанол(4u) + Водород(9u) + Азот(3u) + Натрий(6u) + Хлор(6u) + Нагреть(400K)


        Этилредоксразин(45u) = Кислород(15u) + Углерод(15u) + Калий(5u) + Кремний(5u) + Азот(5u)


