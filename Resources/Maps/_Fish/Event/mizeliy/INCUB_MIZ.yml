- proto: Paper
  entities:
  - uid: 651
    components:
    - type: Transform
      pos: -0.5066929,7.1910563
      parent: 2
    - type: Paper
      stampState: paper_stamp-syndicate
      stampedBy:
      - stampedColor: '#850000FF'
        stampedName: Инкубатор
      content: >-
        Ваша задача похитить экипаж, и продубликлонировать:

        1. Украдите экипаж со станции.

        2. Положите его на операционый стол.

        3. Умертвите жертву.

        4. Клонируйте.

        5. Положите живой оригинал в камеру или же в морг.

        6. Вылечите остаточный труп и реанимируйте.

        7. Удалите у остаточного трупа мозг.

        8. Введите когнизин.

        9. Дождитесь пока остаточный труп придет в себя.

        10. Используйте набор имплантов дубликлонов и введите все 5 имплантов набора в дубля.

        11. Используя телепорт блюспейс шкафов, вызовите блюспейс шкаф и переправте дубля на станцию.

        12. Поддерживайте связь с каждым дублем.

        13. Ваша задача без шума и насилия захватить сектор станции, путем подмены наиболее важных членов  экипажа.

        14. Итоговые цели:  Проследите чтобы ваша деятельность осталась в тайне. Постарайтесь откладывать эвакуацию экипажа и завершение смены на максимально возможный и невозможный срок.



        Если же вам понадобилось продублировать дубля второй раз, возьмите тело оригинала (остаточный труп не имеет возможности быть продублирован во втором поколении).
