    - type: Paper
      stampState: paper_stamp-syndicate
      stampedBy:
      - stampedColor: '#850000FF'
        stampedName: stamp-component-stamped-name-syndicate
      content: >2+
          [bold]Обязанности и полномочия капитана
        Капитан обязан:[/bold]


        1. Руководить работой корабля, на который назначен приказом командования.


        2. Обеспечивать техническую целостность и внутренний порядок на борту судна.


        3. Следить за соблюдением стандартных рабочих процедур и регламентов командования.


        4. Принимать смену и передавать её в надлежащем, идеальном состоянии.


        5. Составлять и хранить документацию в случае необходимости или по требованию командования.

          [bold]Капитан имеет право:[/bold]

        1. Запрашивать выделение личных телохранителей для обеспечения безопасности.


        2. Назначать помощников, наделённых равными с капитаном правами и обязанностями.


        3. Отдавать устные приказы подчинённым лицам; невыполнение таких приказов квалифицируется как халатность и подлежит дисциплинарному взысканию.

          [bold]Капитан не имеет право:[/bold]

        1. Отдавать приказы, затрагивающие группы лиц или имеющие значительные последствия, без соответствующего письменного заверения.


        2. Использовать свои полномочия в целях личной выгоды.


